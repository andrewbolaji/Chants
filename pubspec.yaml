name: chants
description: "The home of football chants."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  cloud_functions: ^6.3.1
  firebase_app_check: ^0.4.4+1
  firebase_crashlytics: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  mockito: ^5.4.5
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ios_icon_1024.png"
  image_path_ios: "assets/icon/ios_icon_1024.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#444444"
  adaptive_icon_foreground: "assets/icon/android_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#444444"
  image: "assets/icon/splash.png"
  android_12:
    image: "assets/icon/splash.png"
    color: "#444444"

flutter:
  uses-material-design: true

  fonts:
    - family: Anton
      fonts:
        - asset: assets/fonts/Anton-Regular.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Bold.ttf
          weight: 700
